    stroke-width="3"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Left curve -->
  <path
    d="M25 20C30 25 30 45 25 50"
    stroke="white"
    stroke-width="3"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Right curve -->
  <path
    d="M45 20C40 25 40 45 45 50"
    stroke="white"
    stroke-width="3"
    stroke-linecap="round"
    fill="none"
  />

</svg>